<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cookbook{% endblock %} · NutriCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style_b.css' %}" />
</head>
<body>
  <nav class="navbar">
    <a href="{% url 'recipe_list' %}" class="nav-brand">📖 <span>The Cookbook</span></a>
    <div class="nav-links">
      <a href="{% url 'recipe_list' %}">My Recipes</a>
      <a href="{% url 'recipe_create' %}" class="btn-nav">+ New Recipe</a>
      <a href="http://localhost:8000" class="btn-nav btn-secondary" target="_blank">🌿 Ingredient DB →</a>
    </div>
  </nav>

  <main class="main-content">
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>📖 The Cookbook &mdash; NutriCalc System &middot; App B running on port 8001</p>
  </footer>
</body>
</html>
