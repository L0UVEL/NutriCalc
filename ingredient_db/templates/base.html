<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Ingredient DB{% endblock %} · NutriCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style_a.css' %}" />
</head>
<body>
  <nav class="navbar">
    <a href="{% url 'ingredient_list' %}" class="nav-brand">🌿 <span>Ingredient DB</span></a>
    <div class="nav-links">
      <a href="{% url 'ingredient_list' %}">Browse</a>
      <a href="{% url 'ingredient_create' %}" class="btn-nav">+ Add Ingredient</a>
      <a href="http://localhost:8001" class="btn-nav btn-secondary" target="_blank">📖 Cookbook →</a>
    </div>
  </nav>

  <main class="main-content">
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>🌿 Ingredient DB &mdash; NutriCalc System &middot; App A running on port 8000</p>
  </footer>
</body>
</html>
