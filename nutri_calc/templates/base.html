<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NutriCalc{% endblock %} · NutriCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/base.css' %}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">&#127807; <span>NutriCalc</span></a>
    <div class="nav-links">
      <a href="/" class="{% block nav_db_active %}{% endblock %}">&#127807; Ingredient DB</a>
      <a href="/cookbook/" class="{% block nav_cb_active %}{% endblock %}">&#128214; Cookbook</a>
      <a href="{% url 'ingredient_create' %}" class="btn-nav-outline">+ Add Ingredient</a>
      <a href="{% url 'recipe_create' %}" class="btn-nav">+ New Recipe</a>
    </div>
  </nav>

  <main class="main-content">
    {% if messages %}
      {% for msg in messages %}
        <div class="alert">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>NutriCalc &mdash; Recipe Nutritional Calculator &middot; Powered by Django</p>
  </footer>
</body>
</html>
